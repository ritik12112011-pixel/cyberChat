<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GLOBAL_NET_MOBILE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');
        body { background: #000; color: #00ff41; font-family: 'Share Tech Mono', monospace; overflow: hidden; height: 100vh; }
        canvas { position: fixed; top: 0; left: 0; z-index: -1; }
        .hacker-panel { border: 1px solid #00ff41; background: rgba(0, 10, 0, 0.95); box-shadow: 0 0 10px rgba(0, 255, 65, 0.2); }
        .msg-left { align-self: flex-start; background: rgba(0, 255, 65, 0.1); border-left: 3px solid #00ff41; padding: 6px 12px; max-width: 85%; margin-bottom: 5px; border-radius: 0 8px 8px 0; }
        .msg-right { align-self: flex-end; background: rgba(0, 255, 65, 0.3); border-right: 3px solid #fff; color: #fff; padding: 6px 12px; max-width: 85%; text-align: right; margin-bottom: 5px; border-radius: 8px 0 0 8px; }
        input { background: #000 !important; border: 1px solid #004400 !important; color: #00ff41 !important; outline: none; font-size: 16px !important; } /* 16px stops iOS zoom */
        .btn { border: 1px solid #00ff41; padding: 8px; cursor: pointer; text-align: center; transition: 0.2s; font-size: 12px; }
        .btn:hover { background: #00ff41; color: #000; }
        
        /* Mobile Sidebar Overlay */
        @media (max-width: 768px) {
            #sidebar {
                position: absolute;
                left: -100%;
                top: 0;
                bottom: 0;
                z-index: 50;
                width: 85%;
                transition: 0.3s ease-in-out;
            }
            #sidebar.open { left: 0; }
            .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 40; }
            .overlay.active { display: block; }
        }
    </style>
</head>
<body class="flex flex-col h-full">

<canvas id="matrix"></canvas>
<div id="sidebarOverlay" class="overlay" onclick="toggleMenu()"></div>

<header class="flex justify-between items-center p-3 border-b border-green-900 bg-black/80">
    <div class="flex items-center gap-3">
        <button onclick="toggleMenu()" class="md:hidden border border-green-500 p-1 px-2 text-xs">MENU</button>
        <h1 class="text-sm md:text-xl font-bold tracking-widest neon-text">MATRIX_HUB_v10</h1>
    </div>
    <div class="flex items-center gap-3">
        <div id="status" class="text-[9px] text-red-500">[OFFLINE]</div>
        <button onclick="toggleMatrix()" class="hidden md:block text-[10px] border border-green-500 px-2">GFX</button>
    </div>
</header>

<div class="flex flex-grow overflow-hidden relative">
    
    <aside id="sidebar" class="w-full md:w-80 flex flex-col gap-3 p-4 hacker-panel h-full">
        <div class="flex flex-col gap-2">
            <label class="text-[10px] opacity-50">USER_ID</label>
            <input id="userName" type="text" placeholder="Nickname" class="w-full p-2">
            
            <label class="text-[10px] opacity-50 mt-2">NEW_UPLINK</label>
            <input id="newRoomName" type="text" placeholder="Room Name" class="w-full p-2">
            <input id="newRoomPass" type="password" placeholder="Pass (Empty=Public)" class="w-full p-2">
            <button onclick="createNewRoom()" class="btn w-full bg-green-900/40 mt-1">INITIALIZE_ROOM</button>
        </div>

        <div class="flex-grow flex flex-col overflow-hidden border-t border-green-900 pt-2">
            <label class="text-[10px] opacity-70 mb-2 font-bold">AVAILABLE_CHANNELS</label>
            <div id="roomHub" class="overflow-y-auto flex-grow space-y-1 pr-1">
                <div class="text-[10px] opacity-30 italic">Pinging nodes...</div>
            </div>
        </div>
    </aside>

    <main class="flex-grow flex flex-col min-w-0">
        <div id="roomDisplay" class="bg-green-950/40 p-2 text-[10px] flex justify-between px-4 border-b border-green-900">
            <span>CHANNEL: NONE</span>
            <span id="memberCount">NODES: 0</span>
        </div>
        
        <div id="chatBox" class="flex-grow p-4 overflow-y-auto flex flex-col">
            <div class="m-auto text-center opacity-20 px-10">
                <p>UPLINK REQUIRED</p>
                <p class="text-[10px]">SELECT CHANNEL FROM MENU</p>
            </div>
        </div>

        <div class="p-3 border-t border-green-900 flex gap-2 bg-black">
            <input id="msgInput" type="text" placeholder="Packet data..." class="flex-grow p-2" disabled>
            <button onclick="sendMessage()" class="btn px-4 bg-green-950/50">SEND</button>
        </div>
    </main>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
    import { getDatabase, ref, push, onChildAdded, set, get, onValue, off, onDisconnect } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js";

    // IMPORTANT: Move these to a config.js file before pushing to GitHub
    const firebaseConfig = {
        apiKey: "AIzaSyC17LQDiQ_C_odiGW5TIT1m_nvZhtjfRUc",
        authDomain: "hacker-chat-app-ec18b.firebaseapp.com",
        projectId: "hacker-chat-app-ec18b",
        databaseURL: "https://hacker-chat-app-ec18b-default-rtdb.asia-southeast1.firebasedatabase.app/",
        appId: "1:803668294668:web:1de379916a11d0bc2dc229"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    let currentRoom = null;
    let myNick = localStorage.getItem('hackerNick') || "User_" + Math.floor(Math.random()*999);
    document.getElementById('userName').value = myNick;

    // --- MOBILE MENU UI ---
    window.toggleMenu = () => {
        document.getElementById('sidebar').classList.toggle('open');
        document.getElementById('sidebarOverlay').classList.toggle('active');
    };

    // --- ROOM HUB ---
    onValue(ref(db, 'rooms'), (snapshot) => {
        const hub = document.getElementById('roomHub');
        hub.innerHTML = "";
        const rooms = snapshot.val();
        if (rooms) {
            Object.keys(rooms).forEach(roomID => {
                const isPublic = rooms[roomID].password === "public";
                const div = document.createElement('div');
                div.className = "p-3 border-b border-green-900/30 cursor-pointer hover:bg-green-900/20";
                div.innerHTML = `<div class="flex justify-between text-xs">
                    <span class="${isPublic ? 'text-green-400' : 'text-yellow-600'}"># ${roomID}</span>
                    <span class="text-[9px] opacity-40">${isPublic ? '[OPEN]' : '[SECURE]'}</span>
                </div>`;
                div.onclick = () => { attemptJoin(roomID, rooms[roomID].password); if(window.innerWidth < 768) toggleMenu(); };
                hub.appendChild(div);
            });
        }
    });

    window.createNewRoom = async () => {
        const name = document.getElementById('newRoomName').value.trim().replace(/\s+/g, '_');
        const pass = document.getElementById('newRoomPass').value.trim() || "public";
        myNick = document.getElementById('userName').value.trim();
        localStorage.setItem('hackerNick', myNick);
        if(!name) return;
        await set(ref(db, 'rooms/' + name), { password: pass, creator: myNick });
        attemptJoin(name, pass);
        if(window.innerWidth < 768) toggleMenu();
    };

    async function attemptJoin(roomID, correctPass) {
        let userPass = "public";
        if (correctPass !== "public") userPass = prompt(`ACCESS KEY FOR [${roomID}]:`);
        if (userPass === correctPass) startChat(roomID);
        else alert("AUTH_ERROR: Invalid Key");
    }

    function startChat(roomID) {
        if(currentRoom) {
            off(ref(db, `messages/${currentRoom}`));
            off(ref(db, `members/${currentRoom}`));
            set(ref(db, `members/${currentRoom}/${myNick}`), null);
        }
        currentRoom = roomID;
        myNick = document.getElementById('userName').value.trim();
        document.getElementById('msgInput').disabled = false;
        document.getElementById('roomDisplay').firstElementChild.innerText = `CHANNEL: ${roomID.toUpperCase()}`;
        document.getElementById('status').innerText = "[ONLINE]";
        document.getElementById('status').className = "text-[9px] text-green-500";
        document.getElementById('chatBox').innerHTML = "";

        onChildAdded(ref(db, `messages/${roomID}`), (data) => {
            const m = data.val();
            const isMe = m.user === myNick;
            const div = document.createElement('div');
            div.className = isMe ? "msg-right" : "msg-left";
            div.innerHTML = `<div class="text-[8px] opacity-40 mb-1">${m.user}</div><div>${m.text}</div>`;
            document.getElementById('chatBox').appendChild(div);
            document.getElementById('chatBox').scrollTop = document.getElementById('chatBox').scrollHeight;
        });

        set(ref(db, `members/${roomID}/${myNick}`), true);
        onDisconnect(ref(db, `members/${roomID}/${myNick}`)).remove();
        onValue(ref(db, `members/${roomID}`), (s) => {
            const count = s.val() ? Object.keys(s.val()).length : 0;
            document.getElementById('memberCount').innerText = `NODES: ${count}`;
        });
    }

    window.sendMessage = () => {
        const input = document.getElementById('msgInput');
        if(input.value.trim() && currentRoom) {
            push(ref(db, `messages/${currentRoom}`), { user: myNick, text: input.value });
            input.value = "";
        }
    };

    document.getElementById('msgInput').onkeypress = (e) => { if(e.key === 'Enter') sendMessage(); };

    // --- MATRIX ENGINE ---
    const canvas = document.getElementById('matrix');
    const ctx = canvas.getContext('2d');
    let mOn = true;
    function res() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    window.onresize = res; res();
    const drops = Array(Math.floor(canvas.width/16)).fill(1);
    function draw() {
        if(!mOn) return;
        ctx.fillStyle = "rgba(0,0,0,0.1)"; ctx.fillRect(0,0,canvas.width,canvas.height);
        ctx.fillStyle = "#0F0"; ctx.font = "15px monospace";
        drops.forEach((y, i) => {
            ctx.fillText(String.fromCharCode(Math.random()*128), i*16, y*16);
            if(y*16 > canvas.height && Math.random() > 0.98) drops[i] = 0;
            drops[i]++;
        });
    }
    setInterval(draw, 50);
    window.toggleMatrix = () => { mOn = !mOn; if(!mOn) ctx.clearRect(0,0,canvas.width,canvas.height); };
</script>
</body>
</html>
